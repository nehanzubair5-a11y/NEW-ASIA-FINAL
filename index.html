<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#DC2626" />
    <meta name="description" content="New Asia Dealer Management System - Login to manage stock, bookings, and orders.">
    <link rel="apple-touch-icon" href="/pwa-192x192.png">
    <title>New Asia DMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'primary': '#DC2626', // red-600
              'secondary': '#B91C1C', // red-700
              'accent': '#EF4444', // red-500
              'neutral': '#6B7280',
              'base-100': '#F8FAFC',
              'base-200': '#F1F5F9',
              'base-300': '#E2E8F0',
              'info': '#2563EB',
              'success': '#16A34A',
              'warning': '#F59E0B',
              'error': '#DC2626',
              'slate': {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
            },
            ringColor: {
              DEFAULT: '#EF4444', // red-500
              primary: '#EF4444', // red-500
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              'spin': {
                'from': { transform: 'rotate(0deg)' },
                'to': { transform: 'rotate(360deg)' },
              },
            },
            animation: {
              'fade-in': 'fade-in 0.2s ease-out',
              'spin': 'spin 1s linear infinite',
            }
          },
        },
      }
    </script>
    <style type="text/css">
      /* Custom Scrollbars */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .dark ::-webkit-scrollbar-thumb { background: #475569; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

      /* --- @media print block: These styles ONLY apply to the printed output --- */
      @media print {
        @page {
          size: auto;
          margin: 1cm;
        }
        body {
          background-color: #fff !important;
          color: #000 !important;
          -webkit-print-color-adjust: exact !important;
          color-adjust: exact !important;
        }

        /* Generic rule to hide UI elements that should never be printed */
        .no-print {
          display: none !important;
        }

        /* General layout reset for a better print view */
        main {
          padding: 0 !important;
          margin: 0 !important;
          overflow: visible !important;
        }
        .container {
          max-width: 100% !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Visual cleanup for printed output */
        .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl {
          box-shadow: none !important;
        }
        .bg-white, .bg-slate-50, .bg-slate-100, .bg-slate-100\/80, .bg-slate-50\/50 {
          background-color: transparent !important;
        }
        table {
            border-collapse: collapse !important;
            width: 100% !important;
        }
        thead {
            display: table-header-group !important;
        }
        tr {
            page-break-inside: avoid !important;
        }
        td, th {
            border: 1px solid #ddd !important;
            padding: 8px !important;
        }
        .print-only {
          display: block !important;
        }
        h1, h2, h3, h4 {
            page-break-after: avoid;
        }
        .recharts-wrapper {
            page-break-inside: avoid;
        }
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dropzone": "https://esm.sh/react-dropzone@14.2.3?external=react",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "@testing-library/jest-dom/": "https://aistudiocdn.com/@testing-library/jest-dom@^6.9.1/",
    "vitest": "https://aistudiocdn.com/vitest@^4.0.1",
    "@testing-library/react": "https://aistudiocdn.com/@testing-library/react@^16.3.0",
    "@testing-library/user-event": "https://aistudiocdn.com/@testing-library/user-event@^14.6.1",
    "vite-plugin-pwa": "https://esm.sh/vite-plugin-pwa@0.19.8",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-base-100 dark:bg-slate-950 dark:text-slate-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
